name: Test Color Scheme

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    name: Validate Color Scheme
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: pip install json5

    - name: Validate JSON syntax
      run: |
        python3 -c "
        import json
        with open('Snazzy.sublime-color-scheme', 'r') as f:
            data = json.load(f)
            print('✓ Valid JSON syntax')
            print(f'✓ Name: {data.get(\"name\", \"unknown\")}')
            print(f'✓ Author: {data.get(\"author\", \"unknown\")}')
            print(f'✓ Rules: {len(data.get(\"rules\", []))}')
            print(f'✓ Variables: {len(data.get(\"variables\", {}))}')
            print('✓ Color scheme validation passed')
        " 

    - name: Check required files
      run: |
        required_files=("Snazzy.sublime-color-scheme" "README.md" "LICENSE")
        for file in "${required_files[@]}"; do
          if [ -f "$file" ]; then
            echo "✓ $file exists"
          else
            echo "✗ $file missing"
            exit 1
          fi
        done